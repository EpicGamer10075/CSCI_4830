<head>
   <link rel="stylesheet" href="/static/css/styles.css">
</head>

<table>
   <tr>
      <td><a class="header" href='../'>Home</a></td>
   </tr>
</table>

<div class="outer">
   <h2>Change Password:</h2>
   <form method="post">
      <input type="password" name="pwPrev" id="pwPrev" placeholder="Previous Password" required><br>
      <input type="password" name="pwNew"  id="pwNew"  placeholder="New Password" required><br>
      <input type="submit">
   </form>
   <p>{{verify}}</p>
</div>

<script>
   if('{{name|tojson}}' == "\"Logged Out\"")
   {
      location.replace("/"); //if logged out, redirect to Home page
   }
   else
   {
      document.querySelector("tr").innerHTML += "<td            ><a class=\"header\"   href='../showAndTell'>Show & Tell</a></td>";
      document.querySelector("tr").innerHTML += "<td            ><a class=\"header\"   href='../logout'     >Logout</a></td>";
      document.querySelector("tr").innerHTML += "<td class=\"s\"><a class=\"header-s\" href='../pwchange'   >Password Change</a></td>";
   }
   document.querySelector("tr").innerHTML += "<td class=\"l\">{{name}}</td>";
</script>
