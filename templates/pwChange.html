<table><tr></tr></table>

<div class="outer">
   <h2>Change Password:</h2>
   <form method="post">
      <input type="password" name="pwPrev" id="pwPrev" placeholder="Previous Password" required><br>

   </form>
   <p>{{verify}}</p>
</div>

	getTabs('{{name|tojson}}', "y", "Password Change")
</script>
